global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'radar-precios'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'localhost:9093'

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # FastAPI application
  - job_name: 'radar-app'
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Redis (if redis_exporter is running)
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:6379']
    scrape_interval: 30s

  # PostgreSQL (if postgres_exporter is running)
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 30s

  # Celery workers (if flower is running)
  - job_name: 'celery'
    static_configs:
      - targets: ['localhost:5555']
    metrics_path: '/api/workers'
    scrape_interval: 30s

  # System metrics (node_exporter)
  - job_name: 'system'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 30s
