name: Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Python tests + backend lint
  # ──────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: radar_precios_test
          POSTGRES_USER: radar
          POSTGRES_PASSWORD: test123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://radar:test123@localhost:5432/radar_precios_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      ENVIRONMENT: test
      JWT_SECRET_KEY: test-secret-key-32-chars-for-ci-only

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 backend tests --count --show-source --statistics
        continue-on-error: true

      - name: Format check with black
        run: black --check backend tests
        continue-on-error: true

      - name: Run pytest
        run: pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend typecheck
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript typecheck
        working-directory: frontend
        run: npm run typecheck

  # ──────────────────────────────────────────────────────────────────────────
  # Smoke test — build the full docker-compose stack and hit /health
  # ──────────────────────────────────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: [test, typecheck]

    steps:
      - uses: actions/checkout@v4

      - name: Create required data directories
        run: mkdir -p data/logs data/backups data/celerybeat

      - name: Write minimal .env for compose
        run: |
          cat > .env <<'ENVEOF'
          ENVIRONMENT=development
          JWT_SECRET_KEY=smoke-test-secret-key-32-chars-ok
          POSTGRES_PASSWORD=radar123
          REDIS_PASSWORD=redis123
          ENVEOF

      - name: Build and start stack
        run: docker compose up -d --build
        timeout-minutes: 10

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for http://localhost:8001/health ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "✓ App is healthy (attempt $i)"
              exit 0
            fi
            echo "  attempt $i/30 — retrying in 10s"
            sleep 10
          done
          echo "✗ App failed to become healthy"
          docker compose logs
          exit 1

      - name: Verify /health endpoint
        run: curl -f http://localhost:8001/health

      - name: Verify /status dashboard
        run: curl -f http://localhost:8001/status | grep -q "PostgreSQL"

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────────────────────────────
  # Security scans
  # ──────────────────────────────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit security checks
        run: |
          pip install bandit
          bandit -r backend -f json -o bandit-report.json
        continue-on-error: true

      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline
