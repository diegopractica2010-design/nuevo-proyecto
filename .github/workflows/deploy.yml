name: Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente a desplegar'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: staging
      url: https://staging.radar.ejemplo.com

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: us-east-1

      - name: Deploy to Staging
        run: |
          # Script de deployment a staging
          # Este es un ejemplo - adaptar a tu infraestructura
          
          # Pull última imagen de Docker
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY_STAGING }}
          
          # Update ECS service
          aws ecs update-service \
            --cluster staging-cluster \
            --service radar-app \
            --force-new-deployment \
            --region us-east-1

      - name: Verify deployment
        run: |
          # Esperar a que el servicio esté healthy
          for i in {1..30}; do
            if curl -f https://staging.radar.ejemplo.com/health > /dev/null 2>&1; then
              echo "✓ Deployment successful"
              exit 0
            fi
            echo "Waiting for deployment... ($i/30)"
            sleep 10
          done
          echo "✗ Deployment timeout"
          exit 1

  deploy-production:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    environment:
      name: production
      url: https://radar.ejemplo.com

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PRODUCTION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PRODUCTION }}
          aws-region: us-east-1

      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Changes in this Release
            - Automated deployment from GitHub Actions
          draft: false
          prerelease: false

      - name: Deploy to Production
        run: |
          # Script de deployment a producción
          echo "🚀 Deploying to production..."
          
          # Pull última imagen de Docker
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY_PRODUCTION }}
          
          # Update ECS service
          aws ecs update-service \
            --cluster production-cluster \
            --service radar-app \
            --force-new-deployment \
            --region us-east-1

      - name: Verify deployment
        run: |
          # Esperar a que el servicio esté healthy
          for i in {1..60}; do
            if curl -f https://radar.ejemplo.com/health > /dev/null 2>&1; then
              echo "✓ Production deployment successful"
              exit 0
            fi
            echo "Waiting for deployment... ($i/60)"
            sleep 10
          done
          echo "✗ Production deployment timeout"
          exit 1

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Production deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Production deployment *${{ job.status }}* for ${{ github.ref }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View deployment>"
                  }
                }
              ]
            }
