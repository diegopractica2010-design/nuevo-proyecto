groups:
  - name: radar_precios
    interval: 30s
    rules:
      # ========================================================================
      # AVAILABILITY ALERTS
      # ========================================================================
      - alert: RadarAppDown
        expr: up{job="radar-app"} == 0
        for: 2m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Radar API is down"
          description: "Radar API has been unreachable for more than 2 minutes"
          runbook: "https://wiki.ejemplo.com/radar/runbooks/app-down"

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(radar_http_errors_total[5m])) /
            sum(rate(radar_http_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes"
          value: "{{ $value | humanizePercentage }}"

      # ========================================================================
      # PERFORMANCE ALERTS
      # ========================================================================
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(radar_http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High API latency"
          description: "95th percentile latency is above 2 seconds"
          value: "{{ $value | humanizeDuration }}"

      - alert: SearchTimeout
        expr: |
          rate(radar_search_requests_total{status="error"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          component: search
        annotations:
          summary: "Search timeouts detected"
          description: "More than 10% of search requests are timing out"
          value: "{{ $value | humanizePercentage }}"

      # ========================================================================
      # DATABASE ALERTS
      # ========================================================================
      - alert: DatabaseSlowQueries
        expr: |
          histogram_quantile(0.95, sum(rate(radar_db_query_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile query latency is above 1 second"
          value: "{{ $value | humanizeDuration }}"

      - alert: DatabaseConnectionPoolExhausted
        expr: radar_db_connection_pool_checked_out / radar_db_connection_pool_size > 0.9
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database connection pool almost exhausted"
          description: "{{ $value | humanizePercentage }} of connections are in use"

      # ========================================================================
      # REDIS ALERTS
      # ========================================================================
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          component: redis
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been unreachable for more than 1 minute"

      - alert: RedisHighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(radar_redis_command_duration_seconds_bucket[5m])) by (le)) > 0.1
        for: 5m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "High Redis latency"
          description: "95th percentile Redis latency is above 100ms"
          value: "{{ $value | humanizeDuration }}"

      - alert: RedisConnectionErrors
        expr: rate(radar_redis_connection_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          component: redis
        annotations:
          summary: "Redis connection errors detected"
          description: "Redis is experiencing connection errors"
          value: "{{ $value }}"

      # ========================================================================
      # CELERY ALERTS
      # ========================================================================
      - alert: CeleryTaskFailure
        expr: |
          rate(radar_celery_tasks_total{status="failure"}[5m]) > 0
        for: 5m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "Celery task failures detected"
          description: "Some Celery tasks are failing"
          value: "{{ $value }}"

      - alert: CeleryQueueBacklog
        expr: radar_celery_queue_size > 100
        for: 5m
        labels:
          severity: warning
          component: celery
        annotations:
          summary: "Large Celery queue backlog"
          description: "Queue {{ $labels.queue }} has {{ $value }} tasks waiting"

      - alert: NoActiveCeleryWorkers
        expr: radar_celery_worker_online == 0
        for: 2m
        labels:
          severity: critical
          component: celery
        annotations:
          summary: "No active Celery workers"
          description: "All Celery workers are offline"

      # ========================================================================
      # RATE LIMITING ALERTS
      # ========================================================================
      - alert: HighRateLimitExceeded
        expr: |
          rate(radar_rate_limit_exceeded_total[5m]) > 0.5
        for: 5m
        labels:
          severity: info
          component: rate_limiting
        annotations:
          summary: "High rate limiting activity"
          description: "{{ $labels.endpoint }} is being rate limited frequently"
          value: "{{ $value | humanize }}"

      # ========================================================================
      # BUSINESS ALERTS
      # ========================================================================
      - alert: NoProductsIndexed
        expr: radar_products_count == 0
        for: 5m
        labels:
          severity: critical
          component: business
        annotations:
          summary: "No products indexed"
          description: "No products have been indexed from any store"

      - alert: StalePriceData
        expr: |
          (time() - histogram_quantile(0.5, max(increase(radar_price_updates_total[1h])) by (store))) > 3600
        for: 1h
        labels:
          severity: warning
          component: business
        annotations:
          summary: "Stale price data"
          description: "Store {{ $labels.store }} hasn't updated prices in over 1 hour"
