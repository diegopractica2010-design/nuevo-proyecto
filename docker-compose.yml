version: '3.9'

services:
  # Redis - Cache + Task Queue Broker
  redis:
    image: redis:7-alpine
    container_name: radar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - radar-network

  # PostgreSQL - Primary Database
  db:
    image: postgres:16-alpine
    container_name: radar-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-radar_precios}
      POSTGRES_USER: ${POSTGRES_USER:-radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-radar123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-radar} -d ${POSTGRES_DB:-radar_precios}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - radar-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: radar-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - radar-network

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-app
    # port 8001 is internal only; nginx proxies on port 80
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://radar:radar123@db:5432/radar_precios}
      REDIS_URL: ${REDIS_URL:-redis://:redis123@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis123@redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis123@redis:6379/2}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head &&
             python -m uvicorn backend.main:app --reload --host 0.0.0.0 --port 8001"
    networks:
      - radar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Celery Worker - Background Tasks
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://radar:radar123@db:5432/radar_precios}
      REDIS_URL: ${REDIS_URL:-redis://:redis123@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis123@redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis123@redis:6379/2}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: python -m celery -A backend.celery_app worker --loglevel=info --concurrency=4
    networks:
      - radar-network
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A backend.celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 2>/dev/null | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # Celery Beat - Scheduled Tasks
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radar-beat
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://radar:radar123@db:5432/radar_precios}
      REDIS_URL: ${REDIS_URL:-redis://:redis123@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis123@redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis123@redis:6379/2}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - .:/app
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    command: python -m celery -A backend.celery_app beat --loglevel=info --schedule=/app/data/celerybeat-schedule
    networks:
      - radar-network
    healthcheck:
      test: ["CMD-SHELL", "python -m celery -A backend.celery_app inspect ping --timeout 5 2>/dev/null | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # ── MONITORING PROFILE (docker compose --profile monitoring up) ─────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: radar-prometheus
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - app
    networks:
      - radar-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: radar-grafana
    profiles: ["monitoring"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3001}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - radar-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: radar-alertmanager
    profiles: ["monitoring"]
    ports:
      - "9093:9093"
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_CHANNEL: ${SLACK_CHANNEL:-#alerts}
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--config.expandenv'
    depends_on:
      - prometheus
    networks:
      - radar-network

  flower:
    image: mher/flower:2.0
    container_name: radar-flower
    profiles: ["monitoring"]
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis123@redis:6379/1}
      FLOWER_PORT: 5555
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:changeme}
      FLOWER_URL_PREFIX: /flower
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - radar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  radar-network:
    driver: bridge
